<div class="container mt-5">
    <button class="btn btn-success w-100">Cadastrar Novo Usuário</button>
    <div>
        <label class="form-label">Pesquisar:</label>
        <input type="text" class="form-control" placeholder="Nome do usuário" (input)="search($event)"/>
    </div>
    <table class="table table-hover table-bordered mt-5">
        <thead class="table-dark">
            <tr>
                <th scope="col">ID</th>
                <th scope="col">Nome Completo</th>
                <th scope="col">E-mail</th>
                <th scope="col">Cargo</th>
                <th scope="col">Salário</th>
                <th scope="col">Situação</th>
                <th></th>
            </tr>
        </thead>
        <tbody>
            @if (usuarios.length > 0) {
                @for (usuario of usuarios; track $index) {
                    <tr>
                        <td>{{usuario.id}}</td>
                        <td>{{usuario.nomeCompleto}}</td>
                        <td>{{usuario.email}}</td>
                        <td>{{usuario.cargo}}</td>
                        <td>{{usuario.salario}}</td>
                        <td>{{usuario.situacao ? "Ativo" : "Inativo"}}</td>
                        <td class="d-flex justify-content-center">
                            <button class="btn btn-warning mx-2">Editar</button>
                            <button class="btn btn-info mx-2">Detalhes</button>
                            <button class="btn btn-danger mx-2" (click)="delete(usuario.id)">Excluir</button>
                        </td>
                    </tr>
                }
            } @else {
                <tr>
                    <td colspan="7" class="text-center">Nenhum usuário encontrado.</td>
                </tr>
            }
        </tbody>
    </table>
</div>
